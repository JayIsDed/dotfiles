# Window Rules

# Float common dialogs
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrule = float, class:^(thunar)$, title:^(Confirm)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save As)$
windowrule = float, class:^(waypaper)$
windowrule = float, class:^(nwg-displays)$

# Pin PiP
windowrule = pin, title:^(Picture-in-Picture)$

# Opacity overrides — some apps look bad transparent
windowrule = opacity 1.0 override 1.0 override, class:^(firefox)$
windowrule = opacity 1.0 override 1.0 override, class:^(chromium)$
windowrule = opacity 1.0 override 1.0 override, class:^(code-url-handler)$

# XWayland video bridge
windowrule = opacity 0.0 override, class:^(xwaylandvideobridge)$
windowrule = noanim, class:^(xwaylandvideobridge)$
windowrule = noinitialfocus, class:^(xwaylandvideobridge)$
windowrule = maxsize 1 1, class:^(xwaylandvideobridge)$
windowrule = noblur, class:^(xwaylandvideobridge)$
