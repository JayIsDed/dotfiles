# Hyprlock — Lock Screen Configuration
source = ~/.config/hyprlock/colors.conf

general {
    grace = 3
    hide_cursor = true
}

# Blurred wallpaper background
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
}

# Clock
label {
    monitor =
    text = $TIME
    color = $lock_on_surface
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:3600000] date "+%A, %B %d"
    color = $lock_on_surface
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = $lock_primary
    inner_color = $lock_surface
    font_color = $lock_on_surface
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 12
    check_color = $lock_primary
    fail_color = $lock_error
    fail_text = <i>$FAIL</i>
    position = 0, -40
    halign = center
    valign = center
}
