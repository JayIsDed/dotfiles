# Oh My Posh prompt — generated by Matugen
# Colors extracted from wallpaper

version = 3
final_space = true
{% raw %}console_title_template = '{{ .Shell }} in {{ .Folder }}'{% endraw %}

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    foreground = '{{colors.primary.default.hex}}'
    {% raw %}template = '{{ .Path }}'{% endraw %}

    [blocks.segments.properties]
      style = 'agnoster_short'
      max_depth = 3

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    foreground = '{{colors.on_surface_variant.default.hex}}'
    foreground_templates = [
      {% raw %}'{{ if gt .Ahead 0 }}{% endraw %}{{colors.secondary.default.hex}}{% raw %}{{ end }}'{% endraw %},
      {% raw %}'{{ if gt .Behind 0 }}{% endraw %}{{colors.error.default.hex}}{% raw %}{{ end }}'{% endraw %},
      {% raw %}'{{ if and (gt .Ahead 0) (gt .Behind 0) }}{% endraw %}{{colors.tertiary.default.hex}}{% raw %}{{ end }}'{% endraw %}
    ]
    {% raw %}template = '  {{ .HEAD }}{{ if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}'{% endraw %}

    [blocks.segments.properties]
      branch_icon = ' '
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = '{{colors.tertiary.default.hex}}'
    {% raw %}template = '  {{ .FormattedMs }}'{% endraw %}

    [blocks.segments.properties]
      threshold = 2000
      style = 'roundrock'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground_templates = [
      {% raw %}'{{ if gt .Code 0 }}{% endraw %}{{colors.error.default.hex}}{% raw %}{{ end }}'{% endraw %},
      {% raw %}'{{ if eq .Code 0 }}{% endraw %}{{colors.primary.default.hex}}{% raw %}{{ end }}'{% endraw %}
    ]
    {% raw %}template = '>'{% endraw %}

[transient_prompt]
  foreground_templates = [
    {% raw %}'{{ if gt .Code 0 }}{% endraw %}{{colors.error.default.hex}}{% raw %}{{ end }}'{% endraw %},
    {% raw %}'{{ if eq .Code 0 }}{% endraw %}{{colors.primary.default.hex}}{% raw %}{{ end }}'{% endraw %}
  ]
  {% raw %}template = '> '{% endraw %}
