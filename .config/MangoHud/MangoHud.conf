# MangoHud — Performance overlay for games
# Toggle with R_Shift + F12 in-game

### Display
position=top-left
round_corners=8
font_size=20
background_alpha=0.3
alpha=0.9

### Metrics
fps
frametime=0
gpu_stats
gpu_temp
gpu_power
gpu_mem_clock
gpu_core_clock
vram
cpu_stats
cpu_temp
cpu_power
ram

### Logging
toggle_hud=Shift_R+F12
toggle_logging=Shift_R+F2
output_folder=/home/jay/Videos/mangohud-logs

### Limits
fps_limit=0
vsync=0
