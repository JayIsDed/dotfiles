[Settings]
language = en
folder = ~/.config/wallpapers
wallpaper = ~/.config/wallpapers/default.jpg
backend = swww
monitors = All
fill = fill
sort = name
color = ffffff
subfolders = False
show_hidden = False
show_gifs_only = False
post_command = ~/.config/hypr/scripts/wallpaper.sh "$wallpaper" > /dev/null 2>&1
