# Decoration — Glass Effect
# GPU-accelerated blur + transparency = frosted glass

decoration {
    rounding = 10

    # Opacity
    active_opacity = 1.0
    inactive_opacity = 0.9

    # Drop shadow
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }

    # Blur — this is the GPU layer of the glass effect
    blur {
        enabled = true
        size = 4
        passes = 4
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
    }
}

# Layer rules — force blur behind transparent panels
layerrule = blur, waybar
layerrule = ignorealpha 0.01, waybar
layerrule = ignorezero, waybar

layerrule = blur, swaync-control-center
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-notification-window

layerrule = blur, rofi
layerrule = ignorealpha 0.01, rofi

layerrule = blur, logout_dialog
