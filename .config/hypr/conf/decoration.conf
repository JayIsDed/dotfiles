# Decoration — Glass Effect
# GPU-accelerated blur + transparency = frosted glass

decoration {
    rounding = 10

    # Opacity
    active_opacity = 1.0
    inactive_opacity = 0.9

    # Drop shadow
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }

    # Blur — this is the GPU layer of the glass effect
    blur {
        enabled = true
        size = 4
        passes = 4
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
    }
}

# Layer rules — force blur behind transparent panels
layerrule = blur on, ignore_alpha 0.01, match:namespace waybar

layerrule = blur on, ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = blur on, ignore_alpha 0.5, match:namespace swaync-notification-window

layerrule = blur on, ignore_alpha 0.01, match:namespace rofi

layerrule = blur on, match:namespace logout_dialog
