# Starship Prompt Config
# Minimal, fast, git-aware

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
format = " [$branch]($style) "
style = "bold purple"

[git_status]
format = '[$all_status$ahead_behind]($style) '
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "x${count}"

[cmd_duration]
min_time = 2_000
format = " [$duration]($style)"
style = "bold yellow"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[package]
disabled = true
