# Window Rules

# Float common dialogs
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(thunar)$, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(thunar)$, match:title ^(Confirm)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:class ^(waypaper)$
windowrule = float on, match:class ^(nwg-displays)$

# Pin PiP
windowrule = pin on, match:title ^(Picture-in-Picture)$

# Opacity overrides — some apps look bad transparent
windowrule = opacity 1.0 override 1.0 override, match:class ^(firefox)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(chromium)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(code-url-handler)$

# Scratchpad sizing
windowrule = float on, match:workspace s[true]
windowrule = size 60% 60%, match:workspace s[true]
windowrule = center on, match:workspace s[true]

# Steam
windowrule = float on, match:class ^(steam)$
windowrule = float on, match:class ^(steamwebhelper)$
windowrule = float on, match:title ^(Steam Settings)$
windowrule = float on, match:title ^(Friends List)$

# Games — fullscreen, no blur, no opacity, no rounding
windowrule = fullscreen on, match:class ^(gamescope)$
windowrule = no_blur on, match:class ^(gamescope)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(gamescope)$

# Wine/Proton games
windowrule = opacity 1.0 override 1.0 override, match:class ^(steam_app_.*)$
windowrule = no_blur on, match:class ^(steam_app_.*)$
windowrule = immediate on, match:class ^(steam_app_.*)$

# Lutris
windowrule = float on, match:class ^(lutris)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(lutris)$

# XWayland video bridge
windowrule = opacity 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = animation none, match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on, match:class ^(xwaylandvideobridge)$
windowrule = max_size 1 1, match:class ^(xwaylandvideobridge)$
windowrule = no_blur on, match:class ^(xwaylandvideobridge)$
