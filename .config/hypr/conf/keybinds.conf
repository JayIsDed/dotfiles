# Keybinds — ML4W-style layout
# Comments after # are parsed by the keybind viewer (SUPER+CTRL+K)
# SUPER = Windows key

$mainMod = SUPER

# ─── Applications ──────────────────────────────────────

bind = $mainMod, Return, exec, kitty # Open terminal
bind = $mainMod, B, exec, firefox # Open browser
bind = $mainMod, E, exec, thunar # Open file manager

# ─── Launchers & Menus ─────────────────────────────────

bind = $mainMod CTRL, Return, exec, rofi -show drun -replace # Application launcher
bind = CTRL, Tab, exec, rofi -show window -replace # Window switcher
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy # Clipboard history
bind = $mainMod CTRL, K, exec, ~/.config/hypr/scripts/keybindings.sh # Show keybindings
bind = $mainMod, N, exec, swaync-client -t -sw # Notification center

# ─── Window Management ────────────────────────────────

bind = $mainMod, Q, killactive # Close window
bind = $mainMod, F, fullscreen, 0 # Fullscreen
bind = $mainMod, M, fullscreen, 1 # Maximize (keep gaps)
bind = $mainMod, T, togglefloating # Toggle floating
bind = $mainMod, J, togglesplit # Toggle split direction
bind = $mainMod, K, swapsplit # Swap split
bind = $mainMod, G, togglegroup # Toggle window group
bind = $mainMod, P, pseudo # Pseudo-tile

# ─── Focus (Arrow Keys + Vim) ─────────────────────────

bind = $mainMod, left, movefocus, l # Focus left
bind = $mainMod, right, movefocus, r # Focus right
bind = $mainMod, up, movefocus, u # Focus up
bind = $mainMod, down, movefocus, d # Focus down
bind = $mainMod, h, movefocus, l # Focus left (vim)
bind = $mainMod, l, movefocus, r # Focus right (vim)
bind = ALT, Tab, cyclenext # Cycle next window
bind = ALT SHIFT, Tab, cyclenext, prev # Cycle previous window

# ─── Swap Windows ──────────────────────────────────────

bind = $mainMod ALT, left, swapwindow, l # Swap left
bind = $mainMod ALT, right, swapwindow, r # Swap right
bind = $mainMod ALT, up, swapwindow, u # Swap up
bind = $mainMod ALT, down, swapwindow, d # Swap down

# ─── Move Windows ─────────────────────────────────────

bind = $mainMod SHIFT, left, movewindow, l # Move window left
bind = $mainMod SHIFT, right, movewindow, r # Move window right
bind = $mainMod SHIFT, up, movewindow, u # Move window up
bind = $mainMod SHIFT, down, movewindow, d # Move window down
bind = $mainMod SHIFT, h, movewindow, l # Move window left (vim)
bind = $mainMod SHIFT, l, movewindow, r # Move window right (vim)
bind = $mainMod SHIFT, k, movewindow, u # Move window up (vim)
bind = $mainMod SHIFT, j, movewindow, d # Move window down (vim)

# ─── Resize Windows ───────────────────────────────────

binde = $mainMod CTRL, left, resizeactive, -20 0 # Resize left
binde = $mainMod CTRL, right, resizeactive, 20 0 # Resize right
binde = $mainMod CTRL, up, resizeactive, 0 -20 # Resize up
binde = $mainMod CTRL, down, resizeactive, 0 20 # Resize down

# ─── Workspaces ────────────────────────────────────────

bind = $mainMod, 1, workspace, 1 # Workspace 1
bind = $mainMod, 2, workspace, 2 # Workspace 2
bind = $mainMod, 3, workspace, 3 # Workspace 3
bind = $mainMod, 4, workspace, 4 # Workspace 4
bind = $mainMod, 5, workspace, 5 # Workspace 5
bind = $mainMod, 6, workspace, 6 # Workspace 6
bind = $mainMod, 7, workspace, 7 # Workspace 7
bind = $mainMod, 8, workspace, 8 # Workspace 8
bind = $mainMod, 9, workspace, 9 # Workspace 9
bind = $mainMod, 0, workspace, 10 # Workspace 10

bind = $mainMod, Tab, workspace, e+1 # Next workspace
bind = $mainMod SHIFT, Tab, workspace, e-1 # Previous workspace

bind = $mainMod, mouse_down, workspace, e+1 # Scroll workspace next
bind = $mainMod, mouse_up, workspace, e-1 # Scroll workspace prev

# ─── Move to Workspace ────────────────────────────────

bind = $mainMod SHIFT, 1, movetoworkspace, 1 # Move to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # Move to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # Move to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # Move to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # Move to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # Move to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # Move to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # Move to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # Move to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # Move to workspace 10

# ─── Screenshots ───────────────────────────────────────

bind = $mainMod, Print, exec, grimblast copy area # Screenshot area
bind = $mainMod ALT, S, exec, grimblast copy area # Screenshot area (alt)
bind = $mainMod ALT, F, exec, grimblast copy screen # Screenshot full screen

# ─── System & Config ──────────────────────────────────

bind = $mainMod CTRL, Q, exec, wlogout # Power menu
bind = $mainMod CTRL, L, exec, hyprlock # Lock screen
bind = $mainMod CTRL, R, exec, hyprctl reload # Reload Hyprland
bind = $mainMod CTRL, W, exec, waypaper # Wallpaper picker
bind = $mainMod, D, exec, nwg-displays # Display manager
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh # Reload waybar
bind = $mainMod CTRL, B, exec, pkill -SIGUSR1 waybar # Toggle waybar

# ─── Mouse ─────────────────────────────────────────────

bindm = $mainMod, mouse:272, movewindow # Drag to move window
bindm = $mainMod, mouse:273, resizewindow # Drag to resize window

# ─── Zoom ──────────────────────────────────────────────

bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{print $2 + 0.5}') # Zoom in
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{print $2 - 0.5}') # Zoom out
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 # Reset zoom

# ─── Audio & Media ─────────────────────────────────────

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ # Volume up
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Volume down
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Toggle mute
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # Toggle mic mute
bindl = , XF86AudioPlay, exec, playerctl play-pause # Play/pause
bindl = , XF86AudioPause, exec, playerctl play-pause # Pause
bindl = , XF86AudioNext, exec, playerctl next # Next track
bindl = , XF86AudioPrev, exec, playerctl previous # Previous track
