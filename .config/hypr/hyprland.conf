# ┌──────────────────────────────────────────┐
# │         Hyprland Configuration           │
# │     github.com/JayIsDed/dotfiles         │
# └──────────────────────────────────────────┘

# Sources — split configs for sanity
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/nvidia.conf
source = ~/.config/hypr/conf/input.conf
source = ~/.config/hypr/conf/decoration.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/layouts.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/windowrules.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/colors.conf

# General
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $primary
    col.inactive_border = $surface_variant
    layout = dwindle
    allow_tearing = false
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    vrr = 1
}
