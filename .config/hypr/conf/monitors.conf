# Monitor Configuration
# Use nwg-displays (SUPER+D) to visually arrange monitors
# It will overwrite this file with the correct positions
#
# Starting layout — adjust with nwg-displays:
#
#            ┌──────────────┐
#            │  Top Center  │
#            │  2560x1440   │
#   ┌──────┐ ├──────────────┴───┐
#   │ Left │ │      Main        │
#   │ Vert │ │   3440x1440      │
#   │2560x │ │                  │
#   │1440  │ └──────────────────┘
#   └──────┘
#
# Run `hyprctl monitors all` to find your monitor names (DP-1, HDMI-A-1, etc.)
# Then either edit below or use nwg-displays to drag them into place.

# Fallback — auto-detect everything until you configure with nwg-displays
monitor = , preferred, auto, 1

# After running nwg-displays, it will replace these with something like:
# monitor = DP-1, 3440x1440@144, 1440x1440, 1       # Main (ultrawide)
# monitor = DP-2, 2560x1440@144, 0x360, 1, transform, 1  # Left (vertical)
# monitor = HDMI-A-1, 2560x1440@144, 1880x0, 1      # Top center

# Bind workspaces to monitors (uncomment after configuring)
# workspace = 1, monitor:DP-1
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1
# workspace = 5, monitor:DP-1
# workspace = 6, monitor:DP-2
# workspace = 7, monitor:DP-2
# workspace = 8, monitor:HDMI-A-1
# workspace = 9, monitor:HDMI-A-1
# workspace = 10, monitor:HDMI-A-1
